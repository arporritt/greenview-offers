let _negoOffer = null;
let _negoBy = 'Seller';

const negoKey = num => `nego_v1_${num}`;
let _customTerms = []; // pending custom terms for the round being built

// Rounds are stored in the Google Sheet (Config tab, key rounds_<num>) so they
// survive reloads and sync across devices. localStorage is a same-device backup.
function loadRounds(num) {
  const fromSheet = cfg['rounds_' + num];
  if (fromSheet) { try { return JSON.parse(fromSheet) || []; } catch {} }
  try { return JSON.parse(localStorage.getItem(negoKey(num))) || []; } catch { return []; }
}
function saveRounds(num, rounds) {
  const json = JSON.stringify(rounds);
  cfg['rounds_' + num] = json;                       // update in-memory copy
  try { localStorage.setItem(negoKey(num), json); } catch {}   // local backup
  // Persist to the Sheet. Use text/plain to avoid a CORS preflight that Apps
  // Script can't answer (application/json would make the write silently fail).
  return fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: 'updateConfig', key: 'rounds_' + num, value: json })
  }).catch(() => {});
}

function buildNegoTabs() {
  const byNum = [...offers].sort((a, b) => +a.num - +b.num);
  document.getElementById('nego-subtabnav').innerHTML = byNum.map(o => {
    const active = String(_negoOffer) === String(o.num);
    const inTalks = loadRounds(o.num).length > 0;
    return `<button class="subtab-btn${active?' active':''}" data-nego="${o.num}" onclick="selectNego(${o.num})">${isWinner(o)?'🏆 ':''}Offer ${o.num}${inTalks?' <span style="color:#34d399" title="in active negotiation">●</span>':''}</button>`;
  }).join('');
}

function selectNego(num) {
  _negoOffer = num;
  _customTerms = []; // clear pending custom terms when switching offers
  document.querySelectorAll('#nego-subtabnav .subtab-btn').forEach(b =>
    b.classList.toggle('active', String(b.dataset.nego) === String(num)));
  renderNego(num);
}

// Custom-term builder: field definitions
const CUSTOM_FIELDS = {
  price:      { cat:'Price',         type:'num',  label:'Purchase price ($)' },
  em:         { cat:'Earnest Money', type:'num',  label:'Earnest money ($)' },
  close_days: { cat:'Closing',       type:'days', label:'Close in N days (from May 31)' },
  comm_pct:   { cat:'Commission',    type:'pct',  label:'Total commission (%)' },
  insp_code:  { cat:'Inspection',    type:'sel',  label:'Inspection', opts:[['none','No requests'],['info','Info only'],['full','With requests']] },
  appr_code:  { cat:'Appraisal',     type:'sel',  label:'Appraisal', opts:[['waived','Waived'],['gap','Gap coverage'],['included','Included']] },
  rent:       { cat:'Rent-Back',     type:'sel',  label:'Rent-back', opts:[['free','Free'],['paid','Paid']] },
  tax_prorate:{ cat:'Tax Proration', type:'text', label:'Tax proration (e.g. 100%)' },
};

function customFieldChanged() {
  const f = document.getElementById('cf-field').value;
  const def = CUSTOM_FIELDS[f];
  const wrap = document.getElementById('cf-input-wrap');
  if (def.type === 'sel') {
    wrap.innerHTML = `<select id="cf-val" onchange="cfPreview()">${def.opts.map(([v,l])=>`<option value="${v}">${l}</option>`).join('')}</select>`;
  } else if (def.type === 'days') {
    wrap.innerHTML = `<input id="cf-val" type="number" placeholder="e.g. 15" oninput="cfDateHint();cfPreview()"><span id="cf-hint" style="font-size:.68rem;color:var(--text-3);margin-left:.4rem"></span>`;
  } else if (def.type === 'pct') {
    wrap.innerHTML = `<input id="cf-val" type="number" step="0.1" placeholder="e.g. 4.5" oninput="cfPreview()">`;
  } else if (def.type === 'num') {
    wrap.innerHTML = `<input id="cf-val" type="number" placeholder="$" oninput="cfPreview()">`;
  } else {
    wrap.innerHTML = `<input id="cf-val" placeholder="value" oninput="cfPreview()">`;
  }
  cfPreview();
}

// Live net-impact preview for the custom-term builder
function cfPreview() {
  const el = document.getElementById('cf-impact'); if (!el) return;
  const f = document.getElementById('cf-field').value;
  const def = CUSTOM_FIELDS[f];
  const raw = document.getElementById('cf-val').value;
  const o = offers.find(x => String(x.num) === String(_negoOffer));
  if (!o || raw === '' || raw == null) { el.textContent = ''; return; }
  let field = f, value;
  if (def.type === 'days')      { field = 'close_days'; value = +raw; }
  else if (def.type === 'pct')  { field = 'comm_pct';   value = +raw / 100; }
  else if (def.type === 'num')  { value = +raw; }
  else if (def.type === 'sel' && f === 'rent') { field = 'rent'; value = raw; }
  else { el.textContent = ''; return; } // text fields have no $ impact
  const oc = Object.assign({}, o); applyTerm(oc, field, value);
  const d = calcNet(oc) - o._net;
  el.textContent = Math.abs(d) >= 1 ? `${d>=0?'+':'−'}${fmt(Math.abs(d))} net` : '';
}
function cfDateHint() {
  const n = +document.getElementById('cf-val').value;
  const hint = document.getElementById('cf-hint');
  if (!n) { hint.textContent = ''; return; }
  const d = new Date(2026, 4, 31); d.setDate(d.getDate() + n); // May=4
  hint.textContent = '→ ' + d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function addCustomTerm() {
  const f = document.getElementById('cf-field').value;
  const def = CUSTOM_FIELDS[f];
  const raw = document.getElementById('cf-val').value;
  if (raw === '' || raw == null) { alert('Enter a value.'); return; }

  let field = f, value, display;
  if (def.type === 'num')      { value = +raw; display = `${def.cat}: ${fmt(value)}`; }
  else if (def.type === 'days'){ field='close_days'; value = +raw;
    const d=new Date(2026,4,31); d.setDate(d.getDate()+value);
    display = `${def.cat}: close ${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})} (${value}d)`; }
  else if (def.type === 'pct') { field='comm_pct'; value = +raw/100; display = `${def.cat}: ${(+raw).toFixed(1)}%`; }
  else if (def.type === 'sel' && f === 'rent') { field='rent'; value=raw; display = `Rent-Back: ${raw==='free'?'Free':'Paid'}`; }
  else if (def.type === 'sel') { value = raw; const lbl=(def.opts.find(o=>o[0]===raw)||[])[1]; display = `${def.cat}: ${lbl}`; }
  else { value = raw; display = `${def.cat}: ${raw}`; }

  _customTerms.push({ cat: def.cat, field, value, display });
  renderNego(_negoOffer);
}
function removeCustomTerm(i) { _customTerms.splice(i,1); renderNego(_negoOffer); }

// Human-readable label for a term — re-derives close/commission so they never
// show as dollars (fixes legacy terms saved with a "$" display too).
function termDisplay(t) {
  if (!t) return '';
  if (t.field === 'close_days') {
    const v = +t.value;
    const d = new Date(2026, 4, 31); d.setDate(d.getDate() + v); // May 31 + v
    return `Close ${d.toLocaleDateString('en-US', { month:'short', day:'numeric' })} (${v} days)`;
  }
  if (t.field === 'comm_pct') return `${(+t.value * 100).toFixed(1)}% commission`;
  if (t.field === 'price' && /^\$?\d/.test(String(t.value))) return fmt(t.value);
  return t.display || '';
}

// Apply one structured term to a working copy of an offer
function applyTerm(oc, field, value) {
  if (field === 'rent') { oc.rent_code = 'free'; oc.rent_cost = 0; }
  else if (field === 'price' || field === 'em' || field === 'close_days') oc[field] = +value;
  else if (field === 'comm_pct') oc.comm_pct = +value;
  else oc[field] = value;
}

// Build the cumulative scenario after applying rounds[0..uptoIndex] to the base offer
function scenarioAfter(base, rounds, uptoIndex) {
  const oc = Object.assign({}, base);
  for (let i = 0; i <= uptoIndex && i < rounds.length; i++) {
    (rounds[i].terms || []).forEach(t => { if (t && t.field) applyTerm(oc, t.field, t.value); });
  }
  oc._net = calcNet(oc);
  oc._score = calcScore(oc);
  return oc;
}

// Apply a list of rounds' terms to a base offer
function applyRounds(base, list) {
  const oc = Object.assign({}, base);
  list.forEach(r => (r.terms || []).forEach(t => { if (t && t.field) applyTerm(oc, t.field, t.value); }));
  oc._net = calcNet(oc);
  oc._score = calcScore(oc);
  return oc;
}

// "Real" offer = base + only ACCEPTED rounds (what's actually agreed so far)
function acceptedOffer(o) {
  const rounds = loadRounds(o.num);
  const acc  = rounds.filter(r => r.accepted && !r.rejected);
  const pend = rounds.filter(r => !r.accepted && !r.rejected);
  const out = acc.length ? applyRounds(o, acc) : Object.assign({}, o);
  out._acceptedCount = acc.length;
  out._pendingCount = pend.length;
  out._negotiated = acc.length > 0;
  out._hasPending = pend.length > 0;
  return out;
}

// "Projected" offer = base + accepted + pending (rejected terms are off the table)
function projectedOffer(o) {
  const rounds = loadRounds(o.num).filter(r => !r.rejected);
  if (!rounds.length) { const c = Object.assign({}, o); c._projected = false; return c; }
  const p = applyRounds(o, rounds);
  p._projected = true;
  return p;
}

// Compare/effective uses the REAL (accepted) state
function effectiveOffer(o) { return acceptedOffer(o); }

// Smart counter-term suggestions — each carries structured {cat, field, type, applyVal} for modeling
function genSuggestions(o) {
  const LIST = cfgN('list_price', 799000);
  const maxPrice = Math.max(...offers.map(x => +x.price));
  const s = [];

  if (+o.price < maxPrice)
    s.push({ id:'price', cat:'Price', field:'price', type:'num', applyVal:maxPrice,
      cur:fmt(o.price), sug:fmt(maxPrice), why:`Highest competing offer is ${fmt(maxPrice)}. Ask them to match.` });
  if (o.insp_code === 'full')
    s.push({ id:'insp', cat:'Inspection', field:'insp_code', type:'enum', applyVal:'none',
      cur:'With requests', sug:'Info-only / no requests', why:'Removes ability to renegotiate repairs after signing.' });
  if (o.appr_code === 'included')
    s.push({ id:'appr', cat:'Appraisal', field:'appr_code', type:'enum', applyVal:'gap',
      cur:'Standard contingency', sug:'Appraisal gap coverage', why:`${fmt(+o.price - LIST)} over list — protects price if it appraises low.` });
  if (+o.em / +o.price < 0.03) {
    const t = Math.round(+o.price * 0.03 / 1000) * 1000;
    s.push({ id:'em', cat:'Earnest Money', field:'em', type:'num', applyVal:t,
      cur:`${fmt(o.em)} (${(+o.em/+o.price*100).toFixed(1)}%)`, sug:`${fmt(t)} (3%)`, why:'More commitment / skin in the game.' });
  }
  if (o.rent_code !== 'free')
    s.push({ id:'rent', cat:'Rent-Back', field:'rent', type:'enum', applyVal:'free',
      cur:o.rent_back || 'Paid', sug:'Free through July 31', why:'Saves your post-close occupancy cost.' });
  if (+o.close_days > 26)
    s.push({ id:'close', cat:'Closing', field:'close_days', type:'num', applyVal:26,
      cur:fmtDate(o.close_date, true), sug:'On or before June 26', why:'Hits your target close window.' });
  const taxpct = parseTaxPct(o.tax_prorate);
  if (taxpct > 1.0 || String(o.tax_prorate||'').toUpperCase()==='TBD')
    s.push({ id:'tax', cat:'Tax Proration', field:'tax_prorate', type:'enum', applyVal:'100%',
      cur:o.tax_prorate||'TBD', sug:'100% of last bill', why:'Standard ask is 105%+; 100% keeps more in your pocket.' });
  if ((parseFloat(o.comm_pct)||0.05) > 0.04)
    s.push({ id:'comm', cat:'Commission', field:'comm_pct', type:'enum', applyVal:0.045,
      cur:`${((parseFloat(o.comm_pct)||0.05)*100).toFixed(1)}%`, sug:'Buyer-agent to 2% (4.5% total)', why:'Direct savings to you.' });

  // Compute each suggestion's modelled net impact
  s.forEach(sg => {
    const oc = Object.assign({}, o);
    applyTerm(oc, sg.field, sg.applyVal);
    sg._delta = calcNet(oc) - o._net;
  });
  return s;
}

function renderNego(num) {
  const o = offers.find(x => String(x.num) === String(num));
  if (!o) return;
  const suggestions = genSuggestions(o);
  const rounds = loadRounds(num);
  window._negoSugg = {}; suggestions.forEach(sg => window._negoSugg[sg.id] = sg);

  const working = rounds.length ? scenarioAfter(o, rounds, rounds.length - 1) : o;
  const netDelta = working._net - o._net;

  document.getElementById('nego-area').innerHTML = `
    <div class="nego-summary">
      <div class="ns-top">
        <span class="ns-name">Offer ${o.num} — ${o.buyers}</span>
        <span class="ns-net">${fmt(o._net)}</span>
      </div>
      <div class="ns-sub">${o.financing} · ${fmt(o.price)} · closes ${fmtDate(o.close_date)} · current net proceeds</div>
    </div>

    <div class="cols2">
    <div>
    <div class="section-title">Working Scenario &amp; History</div>
    ${rounds.length ? `
    <div class="scenario-box">
      <div class="sb-l">Working Scenario · if all logged terms hold</div>
      <div class="sb-figs">
        <div><div class="sb-v">${fmt(working._net)}</div><div class="sb-sub">Net Proceeds</div></div>
        <div><div class="sb-v">${fmt(working.price)}</div><div class="sb-sub">Price</div></div>
      </div>
      <div class="sb-delta">${netDelta>=0?'▲ +':'▼ '}${fmt(Math.abs(netDelta))} net vs current offer</div>
    </div>` : ''}

    <div class="rounds">
      ${rounds.length ? rounds.map((r, i) => {
        const scen = scenarioAfter(o, rounds, i);
        const d = scen._net - o._net;
        const cls = d > 0 ? 'up' : d < 0 ? 'down' : '';
        const acc = !!r.accepted && !r.rejected;
        const rej = !!r.rejected;
        const statusClass = acc ? 'is-accepted' : rej ? 'is-rejected' : '';
        const badge = acc ? ' <span class="tag tag-green" style="margin-left:.3rem">Accepted</span>'
                    : rej ? ' <span class="tag tag-rose" style="margin-left:.3rem">Rejected</span>' : '';
        const btnStyle = 'flex:1;padding:.45rem;border-radius:7px;font-family:inherit;font-weight:600;font-size:.76rem;cursor:pointer';
        let actions;
        if (acc) {
          actions = `<button onclick="setRoundStatus(${num}, ${i}, 'pending')" style="${btnStyle};border:1.5px solid var(--border);background:transparent;color:var(--text-2)">↩ Undo accept</button>`;
        } else if (rej) {
          actions = `<button onclick="setRoundStatus(${num}, ${i}, 'pending')" style="${btnStyle};border:1.5px solid var(--border);background:transparent;color:var(--text-2)">↩ Undo reject</button>`;
        } else {
          actions = `
            <button onclick="setRoundStatus(${num}, ${i}, 'accepted')" style="${btnStyle};border:1.5px solid var(--emerald);background:var(--emerald);color:#fff">Accept</button>
            <button onclick="setRoundStatus(${num}, ${i}, 'rejected')" style="${btnStyle};border:1.5px solid var(--border);background:transparent;color:var(--text-2)">Reject</button>`;
        }
        return `
        <div class="round ${r.by.toLowerCase()} ${statusClass}">
          <div class="round-head">
            <span class="round-by">${r.by} · Round ${i+1}${badge}</span>
            <span class="round-meta">
              <span class="round-date">${r.date}</span>
              <button class="round-del" onclick="delRound(${num}, ${i})">delete</button>
            </span>
          </div>
          ${(r.terms&&r.terms.length) ? `<ul class="round-terms" style="${rej?'text-decoration:line-through;color:var(--text-3)':''}">${r.terms.map(t=>{
            if (t && t.display) return `<li><span class="term-cat">${t.cat||'Term'}</span>${termDisplay(t)}</li>`;
            return `<li>${t}</li>`; // legacy string
          }).join('')}</ul>` : ''}
          ${r.note ? `<div class="round-note">"${r.note}"</div>` : ''}
          ${rej ? '' : `<div class="round-model">
            <div class="rm-item"><div class="rm-v ${cls}">${fmt(scen._net)}</div><div class="rm-l">Net if agreed</div></div>
            <div class="rm-item"><div class="rm-v">${fmt(scen.price)}</div><div class="rm-l">Price</div></div>
            <div class="rm-item"><div class="rm-v ${cls}">${d>=0?'+':'−'}${fmt(Math.abs(d))}</div><div class="rm-l">Δ vs current</div></div>
          </div>`}
          <div style="display:flex;gap:.5rem;margin-top:.5rem">${actions}</div>
        </div>`; }).join('')
        : '<div class="empty">No rounds logged yet. Use the panel on the right to add one.</div>'}
    </div>
    <div style="font-size:.68rem;color:var(--text-3);margin-top:.5rem">History is saved to your Google Sheet — it persists across devices and reloads.</div>
    </div>

    <div>
    <div class="section-title">Step 1 · Whose Move Is This?</div>
    <div class="nego-compose" style="margin-top:0">
      <div class="seg">
        <button id="by-seller" class="${_negoBy==='Seller'?'on':''}" onclick="setNegoBy('Seller')">🟢 Seller counter</button>
        <button id="by-buyer" class="${_negoBy==='Buyer'?'on':''}" onclick="setNegoBy('Buyer')">🔵 Buyer response</button>
      </div>
      <div style="font-size:.74rem;color:var(--text-3);margin-top:.3rem">Pick who is making this move, then choose the terms below.</div>
    </div>

    <div class="section-title">Step 2 · Suggested Counter Terms</div>
    ${suggestions.length ? suggestions.map(sg => {
      const dl = sg._delta;
      const impact = Math.abs(dl) >= 1 ? `${dl>=0?'+':'−'}${fmt(Math.abs(dl))} net` : 'risk / terms';
      return `
      <div class="sugg" id="sugg-${sg.id}">
        <div class="sugg-head">
          <input type="checkbox" class="sugg-check" onchange="toggleSugg('${sg.id}')">
          <div class="sugg-body">
            <div style="display:flex;justify-content:space-between;gap:.5rem">
              <span class="sugg-lever"><span class="term-cat">${sg.cat}</span><span id="sugg-lbl-${sg.id}">${sg.sug}</span></span>
              <span class="sugg-impact ${Math.abs(dl)<1?'neg':''}" id="sugg-impact-${sg.id}">${impact}</span>
            </div>
            <div class="sugg-flow"><span class="cur">${sg.cur}</span><span class="arr">→</span><span class="new" id="sugg-new-${sg.id}">${sg.sug}</span></div>
            <div class="sugg-why">${sg.why}</div>
            <div class="sugg-edit">
              ${sg.type==='num'
                ? `<input id="sugg-val-${sg.id}" type="number" value="${sg.applyVal}" data-id="${sg.id}" oninput="recalcSugg('${sg.id}')">`
                : `<input id="sugg-val-${sg.id}" value="${sg.sug}" data-id="${sg.id}" readonly style="background:var(--bg)">`}
            </div>
          </div>
        </div>
      </div>`; }).join('')
      : '<div class="empty">This offer already meets your ideal terms — nothing obvious to counter.</div>'}

    <div class="section-title">Step 2 · Add a Custom Term</div>
    <div class="nego-compose" style="margin-top:0">
      <div style="display:flex;gap:.4rem;flex-wrap:wrap;align-items:center">
        <select id="cf-field" onchange="customFieldChanged()" style="padding:.45rem .6rem;border:1.5px solid var(--border);border-radius:7px;font-family:inherit;font-size:.8rem">
          ${Object.entries(CUSTOM_FIELDS).map(([k,d])=>`<option value="${k}">${d.label}</option>`).join('')}
        </select>
        <span id="cf-input-wrap" style="display:inline-flex;align-items:center"><input id="cf-val" type="number" placeholder="$" oninput="cfPreview()" style="padding:.45rem .6rem;border:1.5px solid var(--border);border-radius:7px;font-family:inherit;font-size:.8rem"></span>
        <button onclick="addCustomTerm()" style="padding:.45rem .8rem;background:var(--ink);color:#fff;border:none;border-radius:7px;font-family:inherit;font-weight:600;font-size:.78rem;cursor:pointer">+ Add</button>
        <span id="cf-impact" style="font-size:.74rem;font-weight:700;color:var(--emerald)"></span>
      </div>
      ${_customTerms.length ? `<div style="margin-top:.6rem;display:flex;flex-direction:column;gap:.3rem">
        ${_customTerms.map((t,i)=>{
          const oc=Object.assign({},o); applyTerm(oc,t.field,t.value); const d=calcNet(oc)-o._net;
          const imp = Math.abs(d)>=1 ? `${d>=0?'+':'−'}${fmt(Math.abs(d))} net` : 'terms';
          return `<div style="display:flex;justify-content:space-between;align-items:center;background:#f6fefb;border:1px solid var(--emerald-border);border-radius:7px;padding:.35rem .6rem;font-size:.78rem">
            <span><span class="term-cat">${t.cat}</span>${termDisplay(t)}</span>
            <span style="display:flex;gap:.6rem;align-items:center"><b style="color:var(--emerald);font-size:.72rem">${imp}</b><button onclick="removeCustomTerm(${i})" style="background:none;border:none;color:var(--rose);cursor:pointer;font-size:.7rem">remove</button></span>
          </div>`;
        }).join('')}
      </div>` : ''}
    </div>

    <div class="section-title">Step 3 · Record the Round</div>
    <div class="nego-compose">
      <div style="font-size:.74rem;color:var(--text-3);margin-bottom:.3rem">This will be logged as a <b id="record-by-label">${_negoBy}</b> move. Checked suggestions + custom terms above are included &amp; modelled. Add a note for anything else:</div>
      <textarea class="nego-note" id="nego-note" placeholder="e.g. 'Verbally agreed to split the survey cost'…"></textarea>
      <button class="nego-save" onclick="saveRound(${num})">Record ${_negoBy} Move →</button>
    </div>
    </div>
    </div>
  `;
}

function toggleSugg(id) {
  const el = document.getElementById('sugg-' + id);
  el.classList.toggle('on', el.querySelector('.sugg-check').checked);
}

// Human label for a suggestion's entered value (date for close, % for commission, $ otherwise)
function suggValLabel(sg, val) {
  if (sg.field === 'close_days') {
    const d = new Date(2026, 4, 31); d.setDate(d.getDate() + (+val));
    return `Close ${d.toLocaleDateString('en-US', { month:'short', day:'numeric' })} (${+val}d)`;
  }
  if (sg.field === 'comm_pct') return `${(+val * 100).toFixed(1)}% commission`;
  if (sg.type === 'num') return fmt(val);
  return sg.sug;
}

// Recompute a suggestion's net impact + label live as the value box changes
function recalcSugg(id) {
  const sg = window._negoSugg[id]; if (!sg) return;
  const o = offers.find(x => String(x.num) === String(_negoOffer)); if (!o) return;
  const inp = document.getElementById('sugg-val-' + id);
  const val = sg.type === 'num' ? (inp.value === '' ? sg.applyVal : +inp.value) : sg.applyVal;
  const oc = Object.assign({}, o); applyTerm(oc, sg.field, val);
  const dl = calcNet(oc) - o._net;
  const label = suggValLabel(sg, val);
  const impEl = document.getElementById('sugg-impact-' + id);
  if (impEl) {
    impEl.textContent = Math.abs(dl) >= 1 ? `${dl>=0?'+':'−'}${fmt(Math.abs(dl))} net` : 'risk / terms';
    impEl.classList.toggle('neg', Math.abs(dl) < 1);
  }
  const lblEl = document.getElementById('sugg-lbl-' + id); if (lblEl) lblEl.textContent = label;
  const newEl = document.getElementById('sugg-new-' + id); if (newEl) newEl.textContent = label;
}
function setNegoBy(who) {
  _negoBy = who;
  document.getElementById('by-seller').classList.toggle('on', who === 'Seller');
  document.getElementById('by-buyer').classList.toggle('on', who === 'Buyer');
  const lbl = document.getElementById('record-by-label'); if (lbl) lbl.textContent = who;
  const btn = document.querySelector('.nego-save'); if (btn) btn.textContent = `Record ${who} Move →`;
}

function saveRound(num) {
  const terms = [];
  document.querySelectorAll('#nego-area .sugg.on').forEach(el => {
    const inp = el.querySelector('input[id^="sugg-val-"]');
    const sg = window._negoSugg[inp.dataset.id];
    if (!sg) return;
    const value = sg.type === 'num' ? (+inp.value || sg.applyVal) : sg.applyVal;
    const term = { cat: sg.cat, field: sg.field, value: value, display: sg.sug };
    term.display = termDisplay(term) || sg.sug; // close/commission/price re-derived correctly
    terms.push(term);
  });
  // include any custom terms added by the user
  _customTerms.forEach(t => terms.push(t));

  const note = document.getElementById('nego-note').value.trim();
  if (!terms.length && !note) { alert('Check a suggested term, add a custom term, or write a note.'); return; }

  const rounds = loadRounds(num);
  rounds.push({
    by: _negoBy,
    date: new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' }),
    terms, note
  });
  saveRounds(num, rounds);
  _customTerms = []; // reset pending custom terms
  refreshAll(num);
}

function delRound(num, i) {
  const rounds = loadRounds(num);
  rounds.splice(i, 1);
  saveRounds(num, rounds);
  refreshAll(num);
}

function setRoundStatus(num, i, status) {
  const rounds = loadRounds(num);
  rounds[i].accepted = status === 'accepted';
  rounds[i].rejected = status === 'rejected';
  saveRounds(num, rounds);
  refreshAll(num);
}

// Mark (or unmark) an offer as the chosen winning deal — persists to the Sheet
function setWinner(num) {
  const next = String(cfg.winner || '') === String(num) ? '' : String(num);
  cfg.winner = next;
  fetch(APPS_SCRIPT_URL, {
    method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: 'updateConfig', key: 'winner', value: next })
  }).catch(() => {});
  refreshAll(_negoOffer);
}
function isWinner(o) { return String(cfg.winner || '') === String(o.num); }

// Re-render every view so changes show everywhere immediately
function refreshAll(num) {
  buildNegoTabs(); buildOfferTabs();
  renderDashboard(); renderCompare();
  if (_selectedOffer != null) {
    const o = offers.find(x => String(x.num) === String(_selectedOffer));
    if (o) renderOfferDetail(o);
  }
  if (num != null) renderNego(num);
}
</script>
