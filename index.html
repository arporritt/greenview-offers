<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3827 N Greenview — Offer Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f4f5;
  --surface: #ffffff;
  --border: #e4e4e7;
  --border-subtle: #f0f0f1;
  --text: #18181b;
  --text-2: #52525b;
  --text-3: #a1a1aa;
  --ink: #09090b;

  --accent: #18181b;
  --accent-fg: #ffffff;

  --emerald: #059669;
  --emerald-lt: #ecfdf5;
  --emerald-border: #a7f3d0;

  --amber: #d97706;
  --amber-lt: #fffbeb;
  --amber-border: #fde68a;

  --rose: #e11d48;
  --rose-lt: #fff1f2;
  --rose-border: #fecdd3;

  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 1px 2px rgba(16,24,40,.05);
  --shadow-md: 0 4px 12px -2px rgba(16,24,40,.08), 0 2px 6px -2px rgba(16,24,40,.05);
  --shadow-lg: 0 12px 28px -6px rgba(16,24,40,.12), 0 4px 10px -4px rgba(16,24,40,.06);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; max-width: 100%; overflow-x: hidden; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
#app { max-width: 100vw; overflow-x: hidden; }
.tab-pane { max-width: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background:
    radial-gradient(1200px 600px at 100% -10%, #fafafa 0%, rgba(250,250,250,0) 60%),
    var(--bg);
  background-attachment: fixed;
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "cv11", "ss01";
}
.tab-pane :is(.kpi-val, .sc-price, .ohs-v, .nbt-amt, .score-num, .cval-main) { font-variant-numeric: tabular-nums; }

/* ── LOCK ── */
#lock {
  position: fixed; inset: 0;
  background: #fff;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 9999; padding: 2rem;
}
#lock.off { display: none; }
.lock-logo {
  width: 44px; height: 44px; background: var(--ink); border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.25rem; margin-bottom: 1.5rem;
}
#lock h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -.02em; color: var(--ink); }
#lock p { color: var(--text-3); font-size: .82rem; margin: .3rem 0 1.5rem; }
#lock input {
  width: 100%; max-width: 280px;
  padding: .7rem 1rem; border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); font-family: inherit;
  font-size: .9rem; text-align: center; outline: none; color: var(--ink);
  letter-spacing: .05em; transition: border-color .15s;
}
#lock input:focus { border-color: var(--ink); }
#lock button {
  margin-top: .5rem; width: 100%; max-width: 280px;
  padding: .7rem; background: var(--ink); color: #fff;
  font-family: inherit; font-weight: 600; font-size: .88rem;
  border: none; border-radius: var(--radius-sm); cursor: pointer;
  transition: opacity .15s;
}
#lock button:hover { opacity: .85; }
#lock-err { color: var(--rose); font-size: .78rem; margin-top: .4rem; min-height: 1em; }

/* ── APP ── */
#app { display: none; height: 100%; flex-direction: column; }
#app.on { display: flex; }

/* ── TOP BAR ── */
.topbar {
  background: linear-gradient(180deg, #1a1a1f 0%, #09090b 100%);
  padding: 1rem 1.25rem; flex-shrink: 0;
  display: flex; align-items: center; gap: .875rem;
}
.topbar-icon {
  width: 36px; height: 36px;
  background: rgba(255,255,255,.1); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,.12); border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: .9rem; flex-shrink: 0;
}
.topbar-addr { font-size: .68rem; font-weight: 500; color: rgba(255,255,255,.5); letter-spacing: .02em; }
.topbar-title { font-size: 1rem; font-weight: 700; color: #fff; letter-spacing: -.02em; line-height: 1.2; }

/* ── TAB NAV (segmented pills) ── */
.tabnav {
  background: rgba(255,255,255,.8); backdrop-filter: saturate(180%) blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; gap: .25rem; overflow-x: auto; flex-shrink: 0;
  scrollbar-width: none; padding: .5rem .625rem;
  position: sticky; top: 0; z-index: 100;
}
.tabnav::-webkit-scrollbar { display: none; }
.tab-btn {
  padding: .45rem .85rem; font-family: inherit;
  font-size: .78rem; font-weight: 500; color: var(--text-2);
  border: none; background: none; cursor: pointer; white-space: nowrap;
  border-radius: 99px; flex-shrink: 0;
  transition: background .18s, color .18s;
}
.tab-btn:hover { background: var(--bg); color: var(--text); }
.tab-btn.active { background: var(--ink); color: #fff; font-weight: 600; box-shadow: var(--shadow-md); }

/* ── SUB-TAB NAV (inside Offers) ── */
.subtabnav {
  display: flex; gap: .4rem; overflow-x: auto; scrollbar-width: none;
  margin-bottom: 1rem; padding-bottom: .15rem;
}
.subtabnav::-webkit-scrollbar { display: none; }
.subtab-btn {
  padding: .4rem .8rem; font-family: inherit; font-size: .76rem; font-weight: 500;
  color: var(--text-2); background: var(--surface); border: 1px solid var(--border);
  border-radius: 99px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
  transition: all .15s; box-shadow: var(--shadow);
}
.subtab-btn:hover { border-color: var(--text-3); }
.subtab-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); font-weight: 600; }
.subtab-btn .st-net { font-size: .66rem; opacity: .6; margin-left: .3rem; }

/* ── CONTENT ── */
.tab-content { flex: 1; overflow-y: auto; }
.tab-pane { display: none; padding: 1.25rem; max-width: 1080px; margin: 0 auto; }
.tab-pane.active { display: block; animation: paneIn .32s cubic-bezier(.16,1,.3,1); }
@keyframes paneIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ── SHARED ── */
.section-title {
  font-size: .66rem; font-weight: 600; color: var(--text-3);
  text-transform: uppercase; letter-spacing: .08em;
  margin: 1rem 0 .55rem; padding-bottom: .4rem;
  border-bottom: 1px solid var(--border);
}
.section-title:first-child { margin-top: 0; }

/* Two-column layout on wider screens to cut scrolling */
.cols2 { display: grid; gap: 0 1.5rem; align-items: start; }
.cols2 > div { min-width: 0; }
@media (min-width: 860px) { .cols2 { grid-template-columns: 1fr 1fr; } }

.card {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); box-shadow: var(--shadow);
}

.tag {
  display: inline-flex; align-items: center;
  font-size: .68rem; font-weight: 600; padding: .2rem .55rem;
  border-radius: 99px; white-space: nowrap;
}
.tag-green  { background: var(--emerald-lt); color: var(--emerald); }
.tag-amber  { background: var(--amber-lt); color: var(--amber); }
.tag-rose   { background: var(--rose-lt); color: var(--rose); }
.tag-slate  { background: #f4f4f5; color: var(--text-2); }
.tag-dark   { background: var(--ink); color: #fff; }

.flag { font-size: .8rem; padding: .4rem .75rem; border-radius: 8px; margin-bottom: .3rem; line-height: 1.45; }
.flag-rose  { background: var(--rose-lt); color: #9f1239; border: 1px solid var(--rose-border); }
.flag-amber { background: var(--amber-lt); color: #92400e; border: 1px solid var(--amber-border); }
.flag-green { background: var(--emerald-lt); color: #065f46; border: 1px solid var(--emerald-border); }

/* ── DASHBOARD ── */
.ideal-banner {
  background: var(--surface); border: 1px solid var(--emerald-border);
  border-left: 3px solid var(--emerald); border-radius: var(--radius);
  padding: .875rem 1rem; margin-bottom: 1.25rem;
}
.ideal-banner strong {
  font-size: .68rem; font-weight: 700; color: var(--emerald);
  text-transform: uppercase; letter-spacing: .08em; display: block; margin-bottom: .4rem;
}
.ideal-banner ul { font-size: .82rem; color: var(--text-2); padding-left: 1.1rem; }
.ideal-banner li { margin-bottom: .15rem; }

.score-cards { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; margin-bottom: 1.25rem; }
.sc-card {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 1rem;
  cursor: pointer; transition: box-shadow .15s, transform .1s;
  box-shadow: var(--shadow);
}
.sc-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
.sc-card.rank-1 { border-color: var(--emerald-border); background: linear-gradient(180deg, #f6fefb 0%, #ffffff 55%); box-shadow: 0 0 0 1px var(--emerald-border), var(--shadow-md); }
.rank-label { font-size: .65rem; font-weight: 600; color: var(--text-3); letter-spacing: .06em; margin-bottom: .35rem; }
.rank-label.top { color: var(--emerald); }
.sc-buyers { font-size: .85rem; font-weight: 700; line-height: 1.25; margin-bottom: .6rem; color: var(--ink); }
.sc-price { font-size: 1.35rem; font-weight: 800; color: var(--ink); letter-spacing: -.03em; }
.sc-net { font-size: .75rem; font-weight: 500; color: var(--emerald); margin-top: .1rem; }
.sc-fin { font-size: .72rem; color: var(--text-3); margin-top: .4rem; }
.score-row { display: flex; align-items: center; gap: .5rem; margin-top: .75rem; }
.score-track { flex: 1; background: var(--border); border-radius: 99px; height: 5px; }
.score-fill { height: 5px; border-radius: 99px; background: linear-gradient(90deg, #34d399, #059669); }
.score-num { font-size: .72rem; font-weight: 700; color: var(--ink); }

.kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; margin-bottom: 1.25rem; }
.kpi {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); padding: .875rem 1rem;
  box-shadow: var(--shadow);
}
.kpi-val { font-size: 1.35rem; font-weight: 800; color: var(--ink); letter-spacing: -.03em; }
.kpi-lbl { font-size: .68rem; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; margin-top: .2rem; }
.kpi-sub { font-size: .72rem; color: var(--text-3); margin-top: .15rem; }

.net-bars { display: flex; flex-direction: column; gap: .65rem; }
.nb-row { display: flex; align-items: center; gap: .875rem; }
.nb-label { font-size: .78rem; font-weight: 500; width: 110px; flex-shrink: 0; color: var(--text-2); }
.nb-track { flex: 1; background: var(--border); border-radius: 6px; height: 26px; overflow: hidden; }
.nb-fill {
  height: 100%; border-radius: 6px;
  background: linear-gradient(90deg, #3f3f46, #18181b);
  display: flex; align-items: center; padding: 0 .6rem;
  transition: width .7s cubic-bezier(.16,1,.3,1);
}
.nb-fill span { font-size: .72rem; font-weight: 600; color: #fff; white-space: nowrap; }

/* ── COMPARE ── */
.compare-wrap { border-radius: var(--radius); border: 1px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; box-shadow: var(--shadow); }
.compare-table { width: 100%; border-collapse: collapse; min-width: 560px; background: var(--surface); }
/* Column highlight for offers in active negotiation (renders behind transparent cells) */
.compare-table col.nego-col { background: rgba(5,150,105,.09); }
.compare-table th {
  background: var(--ink); color: rgba(255,255,255,.6);
  padding: .65rem .875rem; text-align: left;
  font-size: .65rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: .08em; white-space: nowrap;
}
.compare-table th.offer-col { text-align: center; min-width: 120px; color: #fff; }
.compare-table th.nego { box-shadow: inset 0 -3px 0 var(--emerald); }
.compare-table th:first-child { width: 140px; }
.compare-table td {
  padding: .55rem .875rem; border-bottom: 1px solid var(--border-subtle);
  vertical-align: middle; font-size: .82rem; background: transparent;
}
.compare-table td.offer-col { text-align: center; }
.compare-table tr:last-child td { border-bottom: none; }
.compare-table tr:hover td { background: rgba(0,0,0,.02); }
.row-label { font-size: .75rem; font-weight: 500; color: var(--text-2); }
.section-row td {
  background: var(--bg) !important;
  font-size: .65rem; font-weight: 700; color: var(--text-3);
  text-transform: uppercase; letter-spacing: .08em;
  padding: .4rem .875rem;
}
.cval { display: flex; flex-direction: column; align-items: center; gap: .15rem; }
.cval-main { font-size: .82rem; font-weight: 600; }
.cval-sub { font-size: .68rem; color: var(--text-3); }
.compare-table td.c-best { background: var(--emerald-lt) !important; }
.compare-table td.c-mid  { background: var(--amber-lt) !important; }
.compare-table td.c-bad  { background: var(--rose-lt) !important; }

/* ── OFFER DETAIL ── */
.offer-hero {
  background: linear-gradient(145deg, #27272a 0%, #09090b 70%);
  border-radius: var(--radius);
  padding: 1.4rem; margin-bottom: 1.25rem;
  box-shadow: var(--shadow-lg);
  position: relative; overflow: hidden;
}
.offer-hero::after {
  content: ''; position: absolute; top: -40%; right: -10%;
  width: 240px; height: 240px; border-radius: 50%;
  background: radial-gradient(circle, rgba(52,211,153,.18), transparent 70%);
}
.oh-num { font-size: .65rem; font-weight: 600; color: rgba(255,255,255,.45); letter-spacing: .1em; text-transform: uppercase; margin-bottom: .25rem; }
.oh-name { font-size: 1.2rem; font-weight: 800; color: #fff; letter-spacing: -.02em; }
.oh-agent { font-size: .78rem; color: rgba(255,255,255,.5); margin-top: .2rem; }
.oh-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: .5rem; margin-top: 1rem; }
.ohs { background: rgba(255,255,255,.07); border-radius: var(--radius-sm); padding: .55rem .75rem; }
.ohs-v { font-size: .92rem; font-weight: 700; color: #fff; letter-spacing: -.01em; }
.ohs-l { font-size: .62rem; color: rgba(255,255,255,.4); text-transform: uppercase; letter-spacing: .06em; margin-top: .1rem; }

.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; margin-bottom: 1rem; }
.dg {
  background: var(--surface); border-radius: var(--radius-sm);
  border: 1px solid var(--border); padding: .65rem .875rem;
}
.dg.full { grid-column: 1/-1; }
.dg-l { font-size: .63rem; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .07em; margin-bottom: .25rem; }
.dg-v { font-size: .85rem; font-weight: 500; color: var(--ink); }

.nb-table { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); }
.nbt-row { display: flex; justify-content: space-between; align-items: center; padding: .6rem 1rem; border-bottom: 1px solid var(--border-subtle); font-size: .82rem; }
.nbt-row:last-child { border-bottom: none; background: #fafafa; }
.nbt-row.sub { color: var(--text-2); }
.nbt-row.sub .nbt-amt { color: var(--rose); font-weight: 500; }
.nbt-row.total .nbt-lbl { font-weight: 700; color: var(--ink); }
.nbt-row.total .nbt-amt { font-weight: 800; color: var(--emerald); font-size: .95rem; }

.icl { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); }
.icl-row { display: flex; align-items: center; gap: .75rem; padding: .6rem 1rem; border-bottom: 1px solid var(--border-subtle); font-size: .82rem; }
.icl-row:last-child { border-bottom: none; }
.icl-icon { font-size: .95rem; flex-shrink: 0; }
.icl-lbl { flex: 1; font-weight: 500; }
.icl-val { font-size: .75rem; color: var(--text-3); text-align: right; max-width: 45%; }

/* ── GLOSSARY ── */
.gl-grid { display: grid; grid-template-columns: 1fr; gap: .5rem; align-items: start; }
@media (min-width: 860px) { .gl-grid { grid-template-columns: 1fr 1fr; } }
.gl-item {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 1rem 1.1rem;
  box-shadow: var(--shadow);
}
.gl-term { font-size: .88rem; font-weight: 700; color: var(--ink); margin-bottom: .3rem; letter-spacing: -.01em; }
.gl-def { font-size: .8rem; color: var(--text-2); line-height: 1.55; }
.gl-tip { font-size: .75rem; color: var(--text-3); margin-top: .4rem; padding-top: .4rem; border-top: 1px solid var(--border-subtle); }

/* ── RECOMMENDATION HERO ── */
.rec-hero {
  background: linear-gradient(145deg, #27272a 0%, #09090b 70%);
  border-radius: var(--radius); padding: 1.4rem; margin-bottom: 1.25rem;
  box-shadow: var(--shadow-lg); position: relative; overflow: hidden;
}
.rec-hero::after {
  content: ''; position: absolute; top: -40%; right: -8%;
  width: 240px; height: 240px; border-radius: 50%;
  background: radial-gradient(circle, rgba(52,211,153,.16), transparent 70%);
}
.rec-tag { display: inline-flex; align-items: center; gap: .4rem; font-size: .62rem; font-weight: 700; color: #6ee7b7; text-transform: uppercase; letter-spacing: .12em; margin-bottom: .6rem; }
.rec-tag::before { content: '★'; }
.rec-name { font-size: 1.15rem; font-weight: 700; color: #fff; letter-spacing: -.01em; position: relative; z-index: 1; }
.rec-figures { display: flex; gap: 1.5rem; margin: .9rem 0 1rem; position: relative; z-index: 1; }
.rec-fig-v { font-size: 1.7rem; font-weight: 800; color: #fff; letter-spacing: -.03em; line-height: 1; }
.rec-fig-l { font-size: .65rem; color: rgba(255,255,255,.55); text-transform: uppercase; letter-spacing: .05em; margin-top: .3rem; }
.rec-chips { display: flex; flex-wrap: wrap; gap: .4rem; position: relative; z-index: 1; }
.rec-chip { background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.15); color: #d1fae5; font-size: .7rem; font-weight: 500; padding: .3rem .65rem; border-radius: 99px; }
.rec-cta { margin-top: 1rem; }
.rec-btn { background: #fff; color: #022c22; border: none; border-radius: var(--radius-sm); padding: .55rem 1rem; font-family: inherit; font-weight: 700; font-size: .8rem; cursor: pointer; position: relative; z-index: 1; }

/* ── NET LEADERBOARD ── */
.lb { display: flex; flex-direction: column; gap: .5rem; }
.lb-row { display: flex; align-items: center; gap: .7rem; }
.lb-rank { width: 22px; height: 22px; border-radius: 50%; background: var(--bg); color: var(--text-2); font-size: .72rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.lb-rank.gold { background: var(--emerald-lt); color: var(--emerald); }
.lb-name { font-size: .78rem; font-weight: 500; width: 95px; flex-shrink: 0; color: var(--text-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lb-bar { flex: 1; background: var(--border-subtle); border-radius: 7px; height: 30px; overflow: hidden; position: relative; }
.lb-fill { height: 100%; border-radius: 7px; display: flex; align-items: center; justify-content: flex-end; padding: 0 .6rem; transition: width .7s cubic-bezier(.16,1,.3,1); }
.lb-fill.gold { background: linear-gradient(90deg, #34d399, #059669); }
.lb-fill.dark { background: linear-gradient(90deg, #a1a1aa, #71717a); }
.lb-fill span { font-size: .74rem; font-weight: 700; color: #fff; white-space: nowrap; }

/* ── NEGOTIATE ── */
.nego-summary { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: .9rem 1rem; box-shadow: var(--shadow); margin-bottom: 1rem; }
.nego-summary .ns-top { display: flex; justify-content: space-between; align-items: baseline; gap: .5rem; }
.nego-summary .ns-name { font-size: .95rem; font-weight: 700; color: var(--ink); }
.nego-summary .ns-net { font-size: .95rem; font-weight: 800; color: var(--emerald); }
.nego-summary .ns-sub { font-size: .74rem; color: var(--text-3); margin-top: .15rem; }

.sugg { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: .7rem .85rem; margin-bottom: .55rem; box-shadow: var(--shadow); transition: border-color .15s; }
.sugg.on { border-color: var(--emerald); background: #f6fefb; }
.sugg-head { display: flex; align-items: flex-start; gap: .6rem; }
.sugg-check { width: 18px; height: 18px; margin-top: .1rem; flex-shrink: 0; accent-color: var(--emerald); cursor: pointer; }
.sugg-body { flex: 1; min-width: 0; }
.sugg-lever { font-size: .82rem; font-weight: 700; color: var(--ink); }
.sugg-flow { font-size: .76rem; color: var(--text-2); margin-top: .15rem; }
.sugg-flow .cur { color: var(--rose); }
.sugg-flow .arr { color: var(--text-3); margin: 0 .3rem; }
.sugg-flow .new { color: var(--emerald); font-weight: 600; }
.sugg-why { font-size: .72rem; color: var(--text-3); margin-top: .25rem; }
.sugg-impact { font-size: .72rem; font-weight: 700; color: var(--emerald); white-space: nowrap; }
.sugg-edit { margin-top: .5rem; display: none; }
.sugg.on .sugg-edit { display: block; }
.sugg-edit input { width: 100%; padding: .4rem .6rem; border: 1.5px solid var(--border); border-radius: 7px; font-family: inherit; font-size: .8rem; outline: none; }
.sugg-edit input:focus { border-color: var(--emerald); }

.nego-compose { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; box-shadow: var(--shadow); margin-top: .5rem; }
.seg { display: inline-flex; background: var(--bg); border-radius: 99px; padding: .2rem; gap: .2rem; margin-bottom: .7rem; }
.seg button { border: none; background: none; font-family: inherit; font-size: .75rem; font-weight: 600; color: var(--text-2); padding: .35rem .8rem; border-radius: 99px; cursor: pointer; }
.seg button.on { background: var(--ink); color: #fff; }
.nego-note { width: 100%; padding: .55rem .7rem; border: 1.5px solid var(--border); border-radius: 8px; font-family: inherit; font-size: .82rem; outline: none; resize: vertical; min-height: 2.5rem; margin-top: .5rem; }
.nego-note:focus { border-color: var(--ink); }
.nego-save { width: 100%; margin-top: .6rem; padding: .65rem; background: var(--ink); color: #fff; border: none; border-radius: var(--radius-sm); font-family: inherit; font-weight: 700; font-size: .85rem; cursor: pointer; }
.nego-save:hover { opacity: .9; }

/* timeline of rounds */
.rounds { position: relative; margin-top: .5rem; }
.round { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: .7rem .85rem; margin-bottom: .55rem; box-shadow: var(--shadow); }
/* Neutral cards with a quiet status dot — no heavy colored borders */
.round-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: .35rem; }
.round-by { font-size: .8rem; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: .4rem; }
.round-by::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--text-3); flex-shrink: 0; }
.round.seller .round-by::before { background: var(--emerald); }
.round.buyer .round-by::before { background: #3b82f6; }
.round.is-accepted { background: #fbfefc; border-color: var(--emerald-border); }
.round.is-rejected { opacity: .55; }
.round-date { font-size: .68rem; color: var(--text-3); }
.round-terms { list-style: none; display: flex; flex-direction: column; gap: .2rem; }
.round-terms li { font-size: .78rem; color: var(--text-2); padding-left: 1rem; position: relative; }
.round-terms li::before { content: '→'; position: absolute; left: 0; color: var(--text-3); }
.round-note { font-size: .76rem; color: var(--text-2); font-style: italic; margin-top: .35rem; }
.round-del { font-size: .68rem; color: var(--text-3); background: none; border: none; cursor: pointer; padding: 0; line-height: 1; }
.round-del:hover { color: var(--rose); }
.round-meta { display: flex; align-items: center; gap: .6rem; flex-shrink: 0; }
.term-cat { display: inline-block; font-size: .6rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--text-2); background: var(--bg); border-radius: 4px; padding: .05rem .35rem; margin-right: .35rem; }
.round-model { margin-top: .5rem; padding-top: .45rem; border-top: 1px dashed var(--border); display: flex; gap: 1.1rem; }
.rm-item .rm-v { font-size: .9rem; font-weight: 800; color: var(--ink); }
.rm-item .rm-v.up { color: var(--emerald); }
.rm-item .rm-v.down { color: var(--rose); }
.rm-item .rm-l { font-size: .62rem; color: var(--text-3); text-transform: uppercase; letter-spacing: .05em; }

/* Working scenario — neutral charcoal so it doesn't compete with the green accents */
.scenario-box { background: linear-gradient(145deg,#27272a 0%,#09090b 70%); border-radius: var(--radius); padding: .9rem 1rem; margin-bottom: .6rem; color: #fff; position: relative; overflow: hidden; box-shadow: var(--shadow-md); }
.scenario-box .sb-l { font-size: .62rem; font-weight: 700; color: rgba(255,255,255,.5); text-transform: uppercase; letter-spacing: .08em; }
.scenario-box .sb-figs { display: flex; gap: 1.5rem; margin-top: .5rem; }
.scenario-box .sb-v { font-size: 1.35rem; font-weight: 800; letter-spacing: -.02em; }
.scenario-box .sb-sub { font-size: .62rem; color: rgba(255,255,255,.5); text-transform: uppercase; letter-spacing: .05em; margin-top: .2rem; }
.scenario-box .sb-delta { font-size: .78rem; font-weight: 600; color: #6ee7b7; }
.sugg-impact.neg { color: var(--text-3); }

/* ── LISTING ── */
.listing-hero {
  background: linear-gradient(145deg, #1c1c20 0%, #09090b 70%);
  border-radius: var(--radius); padding: 1.4rem; margin-bottom: 1.25rem;
  box-shadow: var(--shadow-lg); position: relative; overflow: hidden;
}
.listing-hero::after {
  content: ''; position: absolute; top: -50%; right: -5%;
  width: 260px; height: 260px; border-radius: 50%;
  background: radial-gradient(circle, rgba(52,211,153,.14), transparent 70%);
}
.lh-status { display: inline-flex; align-items: center; gap: .35rem; font-size: .62rem; font-weight: 700; color: #34d399; text-transform: uppercase; letter-spacing: .08em; margin-bottom: .5rem; }
.lh-status::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: #34d399; box-shadow: 0 0 0 3px rgba(52,211,153,.25); }
.lh-price { font-size: 2rem; font-weight: 800; color: #fff; letter-spacing: -.03em; }
.lh-psf { font-size: .8rem; color: rgba(255,255,255,.55); margin-top: .15rem; }
.lh-specs { display: grid; grid-template-columns: repeat(3, 1fr); gap: .5rem; margin-top: 1.1rem; position: relative; z-index: 1; }
.lh-spec { background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.08); border-radius: var(--radius-sm); padding: .55rem .7rem; }
.lh-spec-v { font-size: .95rem; font-weight: 700; color: #fff; }
.lh-spec-l { font-size: .6rem; color: rgba(255,255,255,.45); text-transform: uppercase; letter-spacing: .05em; margin-top: .1rem; }

.desc-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.1rem; box-shadow: var(--shadow); font-size: .85rem; line-height: 1.65; color: var(--text-2); }

.feature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; }
.feature-col { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: .9rem 1rem; box-shadow: var(--shadow); }
.feature-col h4 { font-size: .72rem; font-weight: 700; color: var(--ink); margin-bottom: .5rem; letter-spacing: -.01em; }
.feature-col ul { list-style: none; display: flex; flex-direction: column; gap: .3rem; }
.feature-col li { font-size: .8rem; color: var(--text-2); padding-left: 1.1rem; position: relative; }
.feature-col li::before { content: '·'; position: absolute; left: .3rem; color: var(--emerald); font-weight: 700; }

.timeline { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
.tl-row { display: flex; align-items: center; gap: .875rem; padding: .65rem 1rem; border-bottom: 1px solid var(--border-subtle); }
.tl-row:last-child { border-bottom: none; }
.tl-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
.tl-row.active .tl-dot { background: var(--emerald); box-shadow: 0 0 0 3px var(--emerald-lt); }
.tl-date { font-size: .72rem; color: var(--text-3); width: 90px; flex-shrink: 0; }
.tl-event { font-size: .82rem; font-weight: 500; flex: 1; }
.tl-price { font-size: .82rem; font-weight: 700; color: var(--ink); }

.score-chips { display: flex; flex-wrap: wrap; gap: .4rem; }
.score-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 99px; padding: .35rem .7rem; font-size: .75rem; box-shadow: var(--shadow); }
.score-chip b { color: var(--ink); }

/* ── LOADING ── */
.empty { padding: 3rem; text-align: center; color: var(--text-3); font-size: .85rem; }
.spin { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--ink); border-radius: 50%; animation: spin .7s linear infinite; margin-right: .4rem; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── RESPONSIVE ── */
@media (min-width: 640px) {
  .score-cards { grid-template-columns: repeat(4, 1fr); }
  .kpi-grid { grid-template-columns: repeat(4, 1fr); }
  .oh-stats { grid-template-columns: repeat(6, 1fr); }
}
@media (min-width: 768px) {
  .topbar { padding: 1rem 1.75rem; }
  .tab-pane { padding: 1.75rem; }
  .nb-label { width: 150px; }
}

/* ── PHONE (≤520px) ── */
@media (max-width: 520px) {
  body { overflow-x: hidden; }
  .tab-pane { padding: 1rem .9rem; }

  /* Recommendation hero: stack the three figures, smaller type */
  .rec-hero { padding: 1.1rem; }
  .rec-figures { gap: 0; justify-content: space-between; }
  .rec-fig-v { font-size: 1.25rem; }
  .rec-fig-l { font-size: .58rem; }
  .rec-name { font-size: 1rem; }
  .rec-chip { font-size: .66rem; padding: .25rem .55rem; }

  /* Net leaderboard: narrower name column, value below bar if tight */
  .lb-name { width: 78px; font-size: .72rem; }
  .lb-fill span { font-size: .68rem; }

  /* KPI: 2 per row, a touch smaller */
  .kpi-val { font-size: 1.15rem; }
  .kpi-lbl { font-size: .62rem; }
  .kpi-sub { font-size: .66rem; }

  /* Offer hero stats: 2 per row reads better than 3 cramped */
  .oh-stats { grid-template-columns: repeat(2, 1fr); }
  .oh-name { font-size: 1.05rem; }
  .ohs-v { font-size: .85rem; }

  /* Compare + dashboard match tables: tighter cells, smaller min-width */
  .compare-table { min-width: 460px; }
  .compare-table th, .compare-table td { padding: .45rem .5rem; }
  .cval-main { font-size: .76rem; }

  /* Detail grid single column so values aren't squished */
  .detail-grid { grid-template-columns: 1fr; }

  /* Wrap wide flex rows so nothing forces the page wider than the screen */
  .round-model { flex-wrap: wrap; gap: .5rem 1rem; }
  .scenario-box .sb-figs { flex-wrap: wrap; gap: .6rem 1.2rem; }
  .rec-figures { flex-wrap: wrap; gap: .6rem 1.2rem; }
  .offer-hero .oh-stats { gap: .4rem; }

  /* Section headings a bit tighter */
  .section-title { margin: .9rem 0 .5rem; }

  /* Glossary readability */
  .gl-def { font-size: .82rem; }
}
</style>
</head>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbws18Wza1hxu5RHlARb5nli4km5MpSCaIgZWm8sezfU3AkIt2No05fX9scOGtTm8q9YPQ/exec';
</script>

<!-- LOCK -->
<div id="lock">
  <div class="lock-logo">🏠</div>
  <h1>3827 N Greenview</h1>
  <p>Offer Analyzer · Private</p>
  <input id="pw" type="password" placeholder="Enter password" autocomplete="off">
  <button id="pw-btn">Continue</button>
  <div id="lock-err"></div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-icon">🏠</div>
    <div class="topbar-text">
      <div class="topbar-addr">3827 N Greenview Ave Unit 2S · Chicago IL 60613</div>
      <div class="topbar-title">Offer Analyzer</div>
    </div>
  </div>

  <nav class="tabnav" id="tabnav">
    <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
    <button class="tab-btn" data-tab="compare">Compare</button>
    <button class="tab-btn" data-tab="offers">Offers</button>
    <button class="tab-btn" data-tab="negotiate">Negotiate</button>
    <button class="tab-btn" data-tab="listing">Listing</button>
  </nav>

  <div class="tab-content">
    <div class="tab-pane active" id="tab-dashboard"><div class="empty"><span class="spin"></span>Loading…</div></div>
    <div class="tab-pane" id="tab-compare"></div>
    <div class="tab-pane" id="tab-offers">
      <div class="subtabnav" id="subtabnav"></div>
      <div id="offer-detail-area"></div>
    </div>
    <div class="tab-pane" id="tab-negotiate">
      <div class="subtabnav" id="nego-subtabnav"></div>
      <div id="nego-area"></div>
    </div>
    <div class="tab-pane" id="tab-listing"></div>
  </div>
</div>

<script>
const PW_HASH = '6b3d626bac001b7c3ec9d22b17a78d43fca77157';
let cfg = {}, offers = [];

// ── UTILS ─────────────────────────────────────────────────────────────────────
async function sha1(s) {
  const b = await crypto.subtle.digest('SHA-1', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}
const fmt  = n => '$' + Math.round(+n).toLocaleString();
const fmtK = n => '$' + Math.round(+n / 1000) + 'K';
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
// Handles both ISO datetimes from Google Sheets ("2026-06-30T05:00:00.000Z")
// and plain text ("June 15, 2026"). Returns "Jun 30" style, no timezone shift.
function fmtDate(v, withYear) {
  if (v === null || v === undefined || v === '') return '—';
  const s = String(v);
  const m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return MONTHS[+m[2]-1] + ' ' + (+m[3]) + (withYear ? ', ' + m[1] : '');
  return s.replace(', 2026', withYear ? ', 2026' : '');
}
const cfgN = (k, d) => parseFloat(cfg[k]) || d;
const PURCHASE_PRICE = 615000;

function calcScore(o) {
  const fin  = {cash:100,conv20:85,conv10:70,convlt10:50,fha:35,va:35}[o.fin_code] || 50;
  const insp = {none:100,info:80,full:50}[o.insp_code] || 50;
  const appr = {waived:100,gap:75,included:50}[o.appr_code] || 50;
  const rent = {free:100,modified:70,declined:0}[o.rent_code] || 50;
  const LIST = cfgN('list_price', 799000);

  // Timeline: only penalize closing LATER than the June 26 target (~26 days).
  // On-time or earlier = 100 (an early close is good — less carrying cost).
  const TARGET_DAYS = 26;
  const timeline = Math.max(0, 100 - Math.max(0, +o.close_days - TARGET_DAYS) * 3);

  // Commission: lower total commission scores higher. 4% or less = 100, 5% = 50, 6% = 0.
  const comm = parseFloat(o.comm_pct) || 0.05;
  const commScore = Math.max(0, Math.min(100, (0.06 - comm) / 0.02 * 100));

  const raw = (
    0.45 * Math.min(110, +o.price / LIST * 100) +
    0.15 * fin +
    0.10 * Math.min(100, (+o.em / +o.price) / 0.05 * 100) +
    0.10 * insp +
    0.05 * appr +
    0.05 * timeline +
    0.05 * rent +
    0.05 * commScore
  );
  // Theoretical max = 104.5 (price sub-score allowed up to 110). Rescale to 0–100.
  return raw * (100 / 104.5);
}
function parseTaxPct(s) {
  if (!s || String(s).toUpperCase() === 'TBD') return 1.05; // assume 105% if TBD
  const m = String(s).match(/(\d+\.?\d*)/);
  return m ? parseFloat(m[1]) / 100 : 1.05;
}
function taxProrationAmt(o) {
  // Days from Jan 1 to close: May 31 is day 151, so days = 150 + close_days
  const days = 150 + +o.close_days;
  const annual = cfgN('tax_annual', 13700);
  return (days / 365) * annual * parseTaxPct(o.tax_prorate);
}
// Mortgage you keep paying until you close — earlier close = less carrying cost
function carryCost(o) {
  return (+o.close_days / 30.44) * cfgN('monthly_carry', 3511);
}
function calcNet(o) {
  const comm = parseFloat(o.comm_pct) || 0.05;
  return +o.price
    - +o.price * comm
    - +o.price * cfgN('transfer_tax_pct', 0.0045)
    - cfgN('closing_costs', 3650)
    - (+o.rent_cost || 0)
    - taxProrationAmt(o)
    - carryCost(o)
    - cfgN('mortgage_payoff', 486311.79);
}
function idealChecks(o) {
  return [
    { label: 'Cash purchase',           pass: o.fin_code === 'cash',       val: o.financing },
    { label: 'No inspection requests',  pass: o.insp_code !== 'full',      val: o.inspection },
    { label: 'Appraisal waived / gap',  pass: o.appr_code !== 'included',  val: o.appraisal },
    { label: 'Free rent-back',          pass: o.rent_code === 'free',      val: o.rent_back },
    { label: 'Close before June 26',    pass: +o.close_days <= 26,         val: fmtDate(o.close_date, true) },
    { label: 'Strong EM (≥ 3%)',        pass: +o.em / +o.price >= 0.03,    val: fmt(o.em) + ' (' + (+o.em/+o.price*100).toFixed(1) + '%)' },
  ];
}

// ── PASSWORD ──────────────────────────────────────────────────────────────────
document.getElementById('pw-btn').addEventListener('click', tryUnlock);
document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });
if (sessionStorage.getItem('unlocked') === '1') boot();

async function tryUnlock() {
  const h = await sha1(document.getElementById('pw').value.trim().toLowerCase());
  if (h === PW_HASH) { sessionStorage.setItem('unlocked','1'); boot(); }
  else { document.getElementById('lock-err').textContent = 'Incorrect password.'; document.getElementById('pw').value = ''; }
}

function boot() {
  document.getElementById('lock').classList.add('off');
  document.getElementById('app').classList.add('on');
  loadData();
}

// ── DATA ──────────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const r = await fetch(APPS_SCRIPT_URL);
    const data = await r.json();
    cfg = data.config || {};
    offers = (data.offers || []).map(o => ({ ...o, _score: calcScore(o), _net: calcNet(o) }));
    offers.sort((a, b) => b._net - a._net);
    // Recovery: push any device-local rounds that never synced up to the Sheet
    offers.forEach(o => {
      if (!cfg['rounds_' + o.num]) {
        let local = null; try { local = localStorage.getItem(negoKey(o.num)); } catch {}
        if (local && local !== '[]') { cfg['rounds_' + o.num] = local; saveRounds(o.num, JSON.parse(local)); }
      }
    });
    buildOfferTabs();
    buildNegoTabs();
    renderDashboard();
    renderCompare();
    renderListing();
  } catch(e) {
    document.getElementById('tab-dashboard').innerHTML =
      `<div class="empty" style="color:var(--rose)">Could not load data.<br><small>${e.message}</small></div>`;
  }
}

// ── TABS ──────────────────────────────────────────────────────────────────────
let _selectedOffer = null;

function buildOfferTabs() {
  // Sub-tabs inside the "Offers" tab, ordered by offer NUMBER (1→6)
  const byNum = [...offers].sort((a, b) => +a.num - +b.num);
  const sub = document.getElementById('subtabnav');
  sub.innerHTML = byNum.map(o => {
    const active = String(_selectedOffer) === String(o.num);
    const inTalks = loadRounds(o.num).length > 0;
    return `<button class="subtab-btn${active?' active':''}" data-offer="${o.num}" onclick="selectOffer(${o.num})">
      ${isWinner(o)?'🏆 ':''}Offer ${o.num}${inTalks?' <span style="color:#34d399" title="in active negotiation">●</span>':''}<span class="st-net">${fmt(o._net)}</span>
    </button>`;
  }).join('');

  // Wire the main tabs
  document.querySelectorAll('#tabnav .tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });
}

function switchTab(id) {
  document.querySelectorAll('#tabnav .tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
  document.querySelectorAll('.tab-content > .tab-pane').forEach(p => p.classList.toggle('active', p.id === `tab-${id}`));
  if (id === 'offers' && _selectedOffer === null) {
    const byNum = [...offers].sort((a, b) => +a.num - +b.num);
    if (byNum.length) selectOffer(byNum[0].num);
  }
  if (id === 'negotiate' && _negoOffer === null) {
    const byNum = [...offers].sort((a, b) => +a.num - +b.num);
    if (byNum.length) selectNego(byNum[0].num);
  }
  document.querySelector('.tab-content').scrollTop = 0;
}

// Open the Offers tab and show a specific offer (used by dashboard links)
function openOffer(num) {
  switchTab('offers');
  selectOffer(num);
}
function openNego(num) {
  switchTab('negotiate');
  selectNego(num);
}

function selectOffer(num) {
  _selectedOffer = num;
  document.querySelectorAll('.subtab-btn').forEach(b =>
    b.classList.toggle('active', String(b.dataset.offer) === String(num)));
  const o = offers.find(x => String(x.num) === String(num));
  if (o) renderOfferDetail(o);
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDashboard() {
  const LIST    = cfgN('list_price', 799000);
  // Rank by the REAL state: base + accepted terms only
  const real    = offers.map(acceptedOffer);
  const sorted  = [...real].sort((a,b) => b._net - a._net);
  const top     = sorted[0];
  const second  = sorted[1];
  const maxNet  = Math.max(...real.map(o => o._net));
  const gapNext = second ? top._net - second._net : 0;

  // Build "why it wins" chips from the top offer's positives + key facts
  const whyChips = [];
  if (top.fin_code === 'cash') whyChips.push('All cash');
  if (top.insp_code === 'none') whyChips.push('No inspection requests');
  if (top.appr_code !== 'included') whyChips.push('No appraisal risk');
  if (top.rent_code === 'free') whyChips.push('Free rent-back');
  if (gapNext > 0) whyChips.push('+' + fmt(gapNext) + ' vs next offer');

  const firstName = o => o.buyers.split(/[&,]/)[0].trim().split(' ').slice(0,2).join(' ');
  const appreciationPct = ((+top.price - PURCHASE_PRICE)/PURCHASE_PRICE*100).toFixed(0);
  const cagr = ((Math.pow(+top.price/PURCHASE_PRICE, 1/5)-1)*100).toFixed(1);

  // ── Build the narrative explaining WHY the leader wins vs the runner-up ──
  let whyHtml = '';
  if (second) {
    const reasons = [];
    const dPrice = +top.price - +second.price;
    const commT = +top.price * (parseFloat(top.comm_pct)||0.05);
    const commS = +second.price * (parseFloat(second.comm_pct)||0.05);
    const rentT = +top.rent_cost || 0, rentS = +second.rent_cost || 0;

    if (dPrice > 0) reasons.push(`<b>Higher price</b> — ${fmt(top.price)} vs ${fmt(second.price)} (a ${fmt(dPrice)} edge).`);
    else if (dPrice < 0) reasons.push(`Even though the price is ${fmt(-dPrice)} <b>lower</b> than Offer ${second.num}, it still nets more because of stronger terms below.`);
    else reasons.push(`Same price as Offer ${second.num} — the terms break the tie.`);

    if ((parseFloat(top.comm_pct)||0.05) < (parseFloat(second.comm_pct)||0.05))
      reasons.push(`<b>Lower commission</b> — ${(top.comm_pct*100).toFixed(1)}% vs ${(second.comm_pct*100).toFixed(1)}%, roughly ${fmt(Math.abs(commS-commT))} less in fees.`);

    if (top.fin_code === 'cash' && second.fin_code !== 'cash')
      reasons.push(`<b>All cash vs financed</b> — no lender, no appraisal contingency, far lower chance of the deal falling through.`);

    if (top.insp_code !== 'full' && second.insp_code === 'full')
      reasons.push(`<b>No inspection requests</b> — the buyer can't come back for repair credits after signing (Offer ${second.num} can).`);
    if (top.appr_code !== 'included' && second.appr_code === 'included')
      reasons.push(`<b>Appraisal protected</b> — your price is shielded if it appraises low; Offer ${second.num} carries that risk.`);

    if (rentT < rentS)
      reasons.push(`<b>Cheaper rent-back</b> — ${rentT? fmt(rentT):'free'} vs ${fmt(rentS)} for your post-close stay.`);

    if ((+top.em/+top.price) > (+second.em/+second.price))
      reasons.push(`<b>Stronger earnest money</b> — ${fmt(top.em)} (${(+top.em/+top.price*100).toFixed(1)}%) vs ${fmt(second.em)} (${(+second.em/+second.price*100).toFixed(1)}%).`);

    // Caveats from the leader's own red flags
    const redFlags = (top.flags||[]).filter(f => f.type === 'red');

    whyHtml = `
      <div class="card" style="padding:1rem;margin-bottom:1.25rem">
        <div style="font-size:.82rem;line-height:1.5;color:var(--text);margin-bottom:.6rem">
          <b>Offer ${top.num} (${firstName(top)})</b> nets you <b style="color:var(--emerald)">${fmt(top._net)}</b> —
          about <b>${fmt(gapNext)} more</b> than the next-best, Offer ${second.num} (${firstName(second)}) at ${fmt(second._net)}.
          Here's why it comes out ahead:
        </div>
        <ul style="font-size:.8rem;color:var(--text-2);padding-left:1.1rem;display:flex;flex-direction:column;gap:.3rem">
          ${reasons.map(r=>`<li>${r}</li>`).join('')}
        </ul>
        ${redFlags.length ? `
          <div style="margin-top:.7rem;padding-top:.6rem;border-top:1px dashed var(--border)">
            <div style="font-size:.68rem;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem">Before you rely on it</div>
            ${redFlags.map(f=>`<div class="flag flag-rose" style="margin-bottom:.25rem">${f.text}</div>`).join('')}
          </div>` : ''}
      </div>`;
  }

  // Offers in numeric order + medal map (by net rank) for the matrix
  const byNum = [...real].sort((a, b) => +a.num - +b.num);
  const medal = {}; sorted.slice(0, 3).forEach((o, i) => { medal[o.num] = ['🥇','🥈','🥉'][i]; });

  // ── What-if: would a PENDING (proposed-but-not-accepted) counter change the leader? ──
  const proj = offers.map(projectedOffer);
  const projLeader = [...proj].sort((a, b) => b._net - a._net)[0];
  let whatIfHtml = '';
  if (projLeader && String(projLeader.num) !== String(top.num) && projLeader._projected && projLeader._net > top._net) {
    whatIfHtml = `
      <div class="card" style="padding:.9rem 1rem;margin-bottom:1.25rem;border-left:3px solid var(--emerald)">
        <div style="font-size:.68rem;font-weight:700;color:var(--emerald);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem">If Your Counter Is Accepted</div>
        <div style="font-size:.82rem;color:var(--text);line-height:1.5">
          <b>Offer ${projLeader.num} (${firstName(projLeader)})</b> would become the leader at
          <b style="color:var(--emerald)">${fmt(projLeader._net)}</b> net — ahead of the current leader,
          Offer ${top.num} (${firstName(top)}) at ${fmt(top._net)}.
          Its proposed terms aren't accepted yet.
        </div>
        <button class="rec-btn" style="margin-top:.6rem;background:var(--ink);color:#fff" onclick="openNego(${projLeader.num})">Review &amp; accept terms →</button>
      </div>`;
  }

  // ── Negotiation summary (reads rounds stored per offer) ──
  const negoOffers = byNum.map(o => ({ o, rounds: loadRounds(o.num) })).filter(x => x.rounds.length);

  // ── Pending-action banner: who owes the next move ──
  let pendingHtml = '';
  if (negoOffers.length) {
    const items = negoOffers.map(({o, rounds}) => {
      const last = rounds[rounds.length - 1];
      const yourMove = last.by === 'Buyer';            // they responded → ball is yours
      return { o, yourMove, last };
    });
    const yours = items.filter(i => i.yourMove);
    const theirs = items.filter(i => !i.yourMove);
    pendingHtml = `
      <div class="card" style="padding:.9rem 1rem;margin-bottom:1.25rem;border-left:3px solid var(--amber)">
        <div style="font-size:.68rem;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem">⏳ Pending Negotiation</div>
        <div style="display:flex;flex-direction:column;gap:.4rem">
          ${items.map(({o, yourMove, last}) => `
            <div onclick="openNego(${o.num})" style="cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:.6rem">
              <span style="font-size:.82rem"><b>Offer ${o.num} · ${firstName(o)}</b>
                <span style="font-size:.7rem;color:var(--text-3)"> — last move: ${last.by} (${last.date})</span></span>
              <span class="tag ${yourMove ? 'tag-amber' : 'tag-slate'}" style="flex-shrink:0">${yourMove ? '🔔 Your move' : '⏳ Awaiting buyer'}</span>
            </div>`).join('')}
        </div>
        ${yours.length ? `<div style="font-size:.72rem;color:var(--text-2);margin-top:.55rem">You owe a response on <b>${yours.length}</b> offer${yours.length>1?'s':''}. Tap to counter in the Negotiate tab.</div>` : `<div style="font-size:.72rem;color:var(--text-2);margin-top:.55rem">All ${theirs.length} open counter${theirs.length>1?'s are':' is'} awaiting the buyer's response.</div>`}
      </div>`;
  }

  // ── Winning-deal banner ──
  let winnerHtml = '';
  const winOffer = real.find(x => isWinner(x));
  if (winOffer) {
    winnerHtml = `
      <div onclick="openOffer(${winOffer.num})" style="cursor:pointer;background:linear-gradient(145deg,#065f46,#022c22);border-radius:var(--radius);padding:1rem 1.1rem;margin-bottom:1.25rem;box-shadow:var(--shadow-lg);display:flex;align-items:center;justify-content:space-between;gap:.75rem">
        <div>
          <div style="font-size:.62rem;font-weight:700;color:#6ee7b7;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.25rem">🏆 Winning Deal Selected</div>
          <div style="font-size:1.05rem;font-weight:800;color:#fff">Offer ${winOffer.num} — ${winOffer.buyers}</div>
          <div style="font-size:.72rem;color:rgba(255,255,255,.6);margin-top:.1rem">${winOffer.financing} · ${fmt(winOffer.price)} · closes ${fmtDate(winOffer.close_date)}</div>
        </div>
        <div style="text-align:right"><div style="font-size:1.2rem;font-weight:800;color:#fff">${fmt(winOffer._net)}</div><div style="font-size:.6rem;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.05em">Net to You</div></div>
      </div>`;
  }

  let negoSummaryHtml = '';
  if (negoOffers.length) {
    negoSummaryHtml = `
      <div class="section-title">Negotiations In Progress</div>
      <div class="card" style="padding:.5rem">
        ${negoOffers.map(({o, rounds}) => {
          const scen = scenarioAfter(o, rounds, rounds.length - 1);
          const d = scen._net - o._net;
          const last = rounds[rounds.length - 1];
          const ball = last.by === 'Seller' ? 'Buyer to respond' : 'Your move';
          return `
          <div onclick="openNego(${o.num})" style="cursor:pointer;display:flex;align-items:center;gap:.75rem;padding:.6rem .65rem;border-bottom:1px solid var(--border-subtle)">
            <div style="flex:1;min-width:0">
              <div style="font-size:.82rem;font-weight:700;color:var(--ink)">Offer ${o.num} · ${firstName(o)}</div>
              <div style="font-size:.7rem;color:var(--text-3)">${rounds.length} round${rounds.length>1?'s':''} · last: ${last.by} (${last.date}) · <b style="color:var(--ink)">${ball}</b></div>
            </div>
            <div style="text-align:right">
              <div style="font-size:.9rem;font-weight:800;color:var(--emerald)">${fmt(scen._net)}</div>
              <div style="font-size:.66rem;color:${d>=0?'var(--emerald)':'var(--rose)'}">${d>=0?'▲ +':'▼ '}${fmt(Math.abs(d))} if agreed</div>
            </div>
          </div>`;
        }).join('')}
      </div>`;
  } else {
    negoSummaryHtml = `
      <div class="section-title">Negotiations In Progress</div>
      <div class="empty" style="padding:1rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)">
        No active negotiations yet. Open the <b>Negotiate</b> tab to counter an offer and track rounds here.
      </div>`;
  }

  document.getElementById('tab-dashboard').innerHTML = `
    ${winnerHtml}

    <!-- RECOMMENDATION -->
    <div class="rec-hero">
      <div class="rec-tag">${winOffer ? 'Leading Offer · by net proceeds' : 'Leading Offer · by net proceeds'}</div>
      <div class="rec-name">Offer ${top.num} — ${top.buyers.replace('&','&amp;')}</div>
      <div class="rec-figures">
        <div><div class="rec-fig-v">${fmt(top.price)}</div><div class="rec-fig-l">Sale Price</div></div>
        <div><div class="rec-fig-v">${fmt(top._net)}</div><div class="rec-fig-l">Net to You</div></div>
      </div>
      <div class="rec-chips">${whyChips.map(c=>`<span class="rec-chip">${c}</span>`).join('')}</div>
      <div class="rec-cta"><button class="rec-btn" onclick="openOffer(${top.num})">View full detail →</button></div>
    </div>

    ${whatIfHtml}

    ${pendingHtml}

    ${whyHtml}

    <!-- NET LEADERBOARD -->
    <div class="section-title">Net Proceeds — Ranked</div>
    <div class="card" style="padding:1rem">
      <div class="lb">
        ${sorted.map((o, i) => `
          <div class="lb-row" onclick="openOffer(${o.num})" style="cursor:pointer">
            <span class="lb-rank ${i===0?'gold':''}">${i+1}</span>
            <span class="lb-name">#${o.num} ${firstName(o)}</span>
            <div class="lb-bar">
              <div class="lb-fill ${i===0?'gold':'dark'}" style="width:${Math.max(18, Math.round(o._net/maxNet*100))}%">
                <span>${fmt(o._net)}</span>
              </div>
            </div>
          </div>`).join('')}
      </div>
    </div>

    <!-- KEY NUMBERS -->
    <div class="section-title">At a Glance</div>
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-val">${offers.length}</div><div class="kpi-lbl">Offers In</div><div class="kpi-sub">as of May 31</div></div>
      <div class="kpi"><div class="kpi-val">${fmtK(top.price)}</div><div class="kpi-lbl">Highest Net Offer</div><div class="kpi-sub">+${fmtK(+top.price-LIST)} over list</div></div>
      <div class="kpi"><div class="kpi-val" style="color:var(--emerald)">+${appreciationPct}%</div><div class="kpi-lbl">Appreciation</div><div class="kpi-sub">since $615K (2021)</div></div>
      <div class="kpi"><div class="kpi-val">${cagr}%/yr</div><div class="kpi-lbl">Annualized</div><div class="kpi-sub">5-yr CAGR</div></div>
    </div>

    ${negoSummaryHtml}

    <!-- IDEAL SCENARIO MATCH + WATCH-OUTS (full width, ordered 1→6) -->
    <div class="section-title">How Each Offer Matches Your Ideal</div>
    <div class="compare-wrap">
      <table class="compare-table" style="min-width:640px">
        <thead><tr>
          <th>Offer</th>
          <th class="offer-col">Cash</th><th class="offer-col">No Insp.</th>
          <th class="offer-col">Appr. Safe</th><th class="offer-col">Free Rent</th><th class="offer-col">≤Jun 26</th>
          <th style="min-width:200px">Watch-Outs</th>
        </tr></thead>
        <tbody>
          ${byNum.map(o => {
            const ck = p => p ? '<span style="color:var(--emerald);font-weight:700">✓</span>' : '<span style="color:var(--text-3)">·</span>';
            const reds = (o.flags||[]).filter(f => f.type==='red');
            const watch = reds.length
              ? reds.map(f=>`<div style="font-size:.7rem;color:var(--rose);line-height:1.35;margin-bottom:.15rem">⚠ ${f.text}</div>`).join('')
              : '<span style="font-size:.72rem;color:var(--emerald)">✓ None</span>';
            return `<tr onclick="openOffer(${o.num})" style="cursor:pointer">
              <td class="row-label">${medal[o.num]?medal[o.num]+' ':''}#${o.num} ${firstName(o)}</td>
              <td class="offer-col">${ck(o.fin_code==='cash')}</td>
              <td class="offer-col">${ck(o.insp_code!=='full')}</td>
              <td class="offer-col">${ck(o.appr_code!=='included')}</td>
              <td class="offer-col">${ck(o.rent_code==='free')}</td>
              <td class="offer-col">${ck(+o.close_days<=26)}</td>
              <td>${watch}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    <p style="font-size:.68rem;color:var(--text-3);margin-top:.5rem">🥇🥈🥉 mark the top 3 by net proceeds. Rows ordered by offer number.</p>
  `;
}

// ── COMPARE ───────────────────────────────────────────────────────────────────
function renderCompare() {
  // Columns ordered by offer number 1→6, each reflecting its LATEST negotiated terms
  const cols = [...offers].sort((a, b) => +a.num - +b.num).map(effectiveOffer);
  const medal = {}; [...cols].sort((a, b) => b._net - a._net).slice(0, 3)
    .forEach((o, i) => { medal[o.num] = ['🥇','🥈','🥉'][i]; });
  const anyNego = cols.some(o => o._negotiated || o._hasPending);

  function tagHtml(code, map) {
    const [cls, label] = map[code] || ['slate', code];
    return `<span class="tag tag-${cls}">${label}</span>`;
  }
  const finTag  = o => tagHtml(o.fin_code,   {cash:['green','Cash'],conv20:['amber','Conv 20%+'],conv10:['amber','Conv 10%'],convlt10:['rose','Conv <10%'],fha:['rose','FHA'],va:['rose','VA']});
  const inspTag = o => tagHtml(o.insp_code,  {none:['green','No Requests'],info:['amber','Info Only'],full:['rose','With Requests']});
  const apprTag = o => tagHtml(o.appr_code,  {waived:['green','Waived'],gap:['amber','Gap Coverage'],included:['rose','Included']});
  const rentTag = o => tagHtml(o.rent_code,  {free:['green','Free'],modified:['amber','Paid'],declined:['rose','Declined']});

  function rank(fn, high=true) {
    const vals = cols.map(fn);
    const best = high ? Math.max(...vals) : Math.min(...vals);
    const worst = high ? Math.min(...vals) : Math.max(...vals);
    return o => {
      const v = fn(o);
      if (v === best) return 'c-best';
      if (v === worst && cols.length > 1) return 'c-bad';
      return '';
    };
  }

  const priceCls  = rank(o => +o.price);
  const downCls   = rank(o => +o.down_pct);
  const emCls     = rank(o => +o.em);
  const closeCls  = rank(o => -o.close_days);
  const commCls   = rank(o => -(+o.comm_pct||0.05));
  const netCls    = rank(o => o._net);
  const scoreCls  = rank(o => o._score);

  const inNego = o => o._negotiated || o._hasPending;
  const negoTag = o => o._negotiated ? ' <span title="accepted terms applied" style="color:#6ee7b7">✓↻</span>'
                     : o._hasPending ? ' <span title="counter proposed, pending acceptance" style="color:#fbbf24">⋯</span>' : '';
  const negoSub = o => o._negotiated ? ' · terms accepted' : o._hasPending ? ' · counter pending' : '';
  const offerCols = cols.map(o =>
    `<th class="offer-col${inNego(o)?' nego':''}" style="${isWinner(o)?'box-shadow:inset 0 3px 0 var(--emerald)':''}">
      ${isWinner(o)?'🏆 ':medal[o.num]?medal[o.num]+' ':''}Offer ${o.num}${negoTag(o)}<br>
      <span style="font-weight:500;font-size:.65rem;color:rgba(255,255,255,.55)">${o.buyers.split(/[&,]/)[0].trim().split(' ')[0]}${negoSub(o)}</span>
    </th>`).join('');
  const colGroup = `<colgroup><col style="width:150px">${cols.map(o=>`<col style="width:150px"${inNego(o)?' class="nego-col"':''}>`).join('')}</colgroup>`;

  const check = pass => pass ? '<span style="font-size:1rem">✅</span>' : '<span style="font-size:1rem">❌</span>';
  const span  = n => `<div class="cval"><div class="cval-main">${n}</div></div>`;
  const N = cols.length + 1;

  document.getElementById('tab-compare').innerHTML = `
    <div class="compare-wrap">
    <table class="compare-table" style="table-layout:fixed;min-width:${150*(cols.length+1)}px">
      ${colGroup}
      <thead><tr><th>Criteria</th>${offerCols}</tr></thead>
      <tbody>
        <tr class="section-row"><td colspan="${N}">Price &amp; Financing</td></tr>
        <tr>
          <td class="row-label">Offer Price</td>
          ${cols.map(o => `<td class="offer-col ${priceCls(o)}">
            <div class="cval"><div class="cval-main">${fmt(o.price)}</div>
            <div class="cval-sub">+${fmtK(+o.price - cfgN('list_price',799000))}</div></div>
          </td>`).join('')}
        </tr>
        <tr>
          <td class="row-label">$ / Sq Ft</td>
          ${cols.map(o => `<td class="offer-col">${span('$' + Math.round(+o.price / cfgN('sqft',1533)).toLocaleString())}</td>`).join('')}
        </tr>
        <tr><td class="row-label">Financing</td>${cols.map(o=>`<td class="offer-col">${finTag(o)}</td>`).join('')}</tr>
        <tr>
          <td class="row-label">Down Payment</td>
          ${cols.map(o => `<td class="offer-col ${downCls(o)}">${span(o.down_pct + '%')}</td>`).join('')}
        </tr>

        <tr class="section-row"><td colspan="${N}">Risk &amp; Contingencies</td></tr>
        <tr>
          <td class="row-label">Earnest Money</td>
          ${cols.map(o => `<td class="offer-col ${emCls(o)}">
            <div class="cval"><div class="cval-main">${fmt(o.em)}</div>
            <div class="cval-sub">${(+o.em/+o.price*100).toFixed(1)}%</div></div>
          </td>`).join('')}
        </tr>
        <tr><td class="row-label">Inspection</td>${cols.map(o=>`<td class="offer-col">${inspTag(o)}</td>`).join('')}</tr>
        <tr><td class="row-label">Appraisal</td>${cols.map(o=>`<td class="offer-col">${apprTag(o)}</td>`).join('')}</tr>

        <tr class="section-row"><td colspan="${N}">Timing &amp; Possession</td></tr>
        <tr>
          <td class="row-label">Close Date</td>
          ${cols.map(o => `<td class="offer-col ${closeCls(o)}">
            <div class="cval"><div class="cval-main">${fmtDate(o.close_date)}</div>
            <div class="cval-sub">${o.close_days} days out</div></div>
          </td>`).join('')}
        </tr>
        <tr><td class="row-label">Possession</td>${cols.map(o=>`<td class="offer-col">${span(fmtDate(o.possession))}</td>`).join('')}</tr>
        <tr><td class="row-label">Rent-Back</td>${cols.map(o=>{
          const cost = +o.rent_cost || 0;
          const sub = o.rent_code==='free' ? `<div class="cval-sub" style="color:var(--emerald)">$0 / no cost</div>`
            : cost ? `<div class="cval-sub" style="color:var(--rose)">−${fmt(cost)} cost</div>` : '';
          return `<td class="offer-col">${rentTag(o)}${sub}</td>`;
        }).join('')}</tr>

        <tr class="section-row"><td colspan="${N}">Ideal Scenario ✓</td></tr>
        <tr><td class="row-label">Cash?</td>${cols.map(o=>`<td class="offer-col">${check(o.fin_code==='cash')}</td>`).join('')}</tr>
        <tr><td class="row-label">No Insp. Requests?</td>${cols.map(o=>`<td class="offer-col">${check(o.insp_code!=='full')}</td>`).join('')}</tr>
        <tr><td class="row-label">Free Rent-Back?</td>${cols.map(o=>`<td class="offer-col">${check(o.rent_code==='free')}</td>`).join('')}</tr>
        <tr><td class="row-label">Close ≤ Jun 26?</td>${cols.map(o=>`<td class="offer-col">${check(+o.close_days<=26)}</td>`).join('')}</tr>
        <tr><td class="row-label">Appraisal Waived?</td>${cols.map(o=>`<td class="offer-col">${check(o.appr_code==='waived')}</td>`).join('')}</tr>

        <tr class="section-row"><td colspan="${N}">Bottom Line</td></tr>
        <tr>
          <td class="row-label">Commission</td>
          ${cols.map(o => {
            const rate = +o.comm_pct || 0.05;
            const dollars = +o.price * rate;
            const savesVs5 = +o.price * (0.05 - rate); // + if below 5%
            const sub = savesVs5 > 1
              ? `<div class="cval-sub" style="color:var(--emerald)">${fmt(dollars)} · saves ${fmt(savesVs5)} vs 5%</div>`
              : `<div class="cval-sub">${fmt(dollars)}</div>`;
            return `<td class="offer-col ${commCls(o)}"><div class="cval"><div class="cval-main">${(rate*100).toFixed(1)}%</div>${sub}</div></td>`;
          }).join('')}
        </tr>
        <tr>
          <td class="row-label">Transfer Tax (0.45%)</td>
          ${cols.map(o => `<td class="offer-col"><div class="cval-sub">−${fmt(+o.price*cfgN('transfer_tax_pct',0.0045))}</div></td>`).join('')}
        </tr>
        <tr>
          <td class="row-label">Tax Proration</td>
          ${cols.map(o => `<td class="offer-col"><div class="cval"><div class="cval-main" style="font-size:.76rem">${o.tax_prorate||'TBD'}</div><div class="cval-sub" style="color:var(--rose)">−${fmt(taxProrationAmt(o))}</div></div></td>`).join('')}
        </tr>
        <tr>
